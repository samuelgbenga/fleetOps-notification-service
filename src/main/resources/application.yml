server:
  port: 8085

spring:
  application:
    name: notification-service

  # ─── NO datasource config — this service has no database ───

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    consumer:
      group-id: notification-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.fleetops.notification.kafka.event"

  # ─── Mailtrap SMTP config ───

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username:  ${MAIL_USERNAME:your_mailtrap_username}
    password: ${MAIL_PASSWORD:your_mailtrap_password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

notification:
  from-email: ${MAIL_FROM:agholordavid19@gmail.com}
  from-name: "FleetOps System"

kafka:
  topics:
    notification-request: notification.request
